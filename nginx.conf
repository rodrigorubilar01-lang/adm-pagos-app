server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 10m;

  # Proxy /parse → backend (texto → Claude)
  location /parse {
    proxy_pass https://app-adm-pagos-adm-pagos.torwwh.easypanel.host/parse;
    proxy_http_version 1.1;
    proxy_set_header Host app-adm-pagos-adm-pagos.torwwh.easypanel.host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    proxy_read_timeout 60s;
  }

  # Proxy /parse-audio → backend (audio → Whisper → Claude)
  location /parse-audio {
    proxy_pass https://app-adm-pagos-adm-pagos.torwwh.easypanel.host/parse-audio;
    proxy_http_version 1.1;
    proxy_set_header Host app-adm-pagos-adm-pagos.torwwh.easypanel.host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    proxy_read_timeout 90s;
    client_max_body_size 10m;
  }

  # PWA: cache largo para assets, sin cache para index.html y sw
  location ~* \.(js|css|png|jpg|jpeg|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /sw.js {
    add_header Cache-Control "no-cache";
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
