server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 25M;

  # Proxy /parse → backend interno (texto → Claude)
  location /parse {
    proxy_pass http://adm_pagos:3001/parse;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
  }

  # Proxy /parse-audio → backend interno (audio → Whisper → Claude)
  location /parse-audio {
    proxy_pass http://adm_pagos:3001/parse-audio;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_connect_timeout 10s;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # Endpoint de verificación de versión
  location /version {
    proxy_pass http://adm_pagos:3001/version;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # Health check
  location /health {
    proxy_pass http://adm_pagos:3001/health;
    proxy_http_version 1.1;
  }

  # PWA: cache largo para assets
  location ~* \.(js|css|png|jpg|jpeg|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /sw.js {
    add_header Cache-Control "no-cache";
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
